<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirect</title>
  </head>
  <body>
    <script>
      var path = window.location.pathname.replace('/Light-Sample-Portfolio', '');
      window.location.replace('/Light-Sample-Portfolio/?redirect=' + encodeURIComponent(path));
    </script>
  </body>
</html>
